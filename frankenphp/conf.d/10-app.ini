expose_php = 0
date.timezone = Europe/Paris
apc.enable_cli = 1
session.use_strict_mode = 1
; PHP's default (On) skips rewriting a session file when its data hasn't changed - but that also
; skips touching its mtime, which is what native file-based GC (session.gc_maxlifetime, 1440s by
; default) uses to decide what's expired. A purely-navigational, read-mostly session (nothing
; mutates the security token/session data on every request) can look "idle" by mtime long before
; it actually is, and GC deletes it out from under a still-active user - surfaces as a seemingly
; random mid-session logout, no deploy or timeout involved. Off forces a mtime touch on every
; request that has an active session, so GC only ever reaps sessions genuinely unused for
; gc_maxlifetime.
session.lazy_write = 0
zend.detect_unicode = 0

; Default (2M/8M) is too tight for this app's file uploads - must stay at or above
; App\Form\FileUploadDefaults::MAX_SIZE (the platform-wide per-file default, currently 20M), the
; largest any FileType field is allowed to declare. Keep both in sync with that constant, otherwise
; PHP silently drops oversized uploads before Symfony's File constraint ever sees them.
upload_max_filesize = 20M
post_max_size = 21M

; https://symfony.com/doc/current/performance.html
realpath_cache_size = 4096K
realpath_cache_ttl = 600
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 32531
opcache.memory_consumption = 256
opcache.enable_file_override = 1
