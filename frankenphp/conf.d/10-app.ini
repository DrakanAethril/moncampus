expose_php = 0
date.timezone = Europe/Paris
apc.enable_cli = 1
session.use_strict_mode = 1
zend.detect_unicode = 0

; Default (2M/8M) is too tight for a full-page print-quality cover/calendar upload (Livret
; Alternant, see App\Form\ProgramInfoUploadType's matching 15M File constraint) - keep both in
; sync, otherwise PHP silently drops oversized uploads before Symfony's validator ever sees them.
upload_max_filesize = 15M
post_max_size = 16M

; https://symfony.com/doc/current/performance.html
realpath_cache_size = 4096K
realpath_cache_ttl = 600
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 32531
opcache.memory_consumption = 256
opcache.enable_file_override = 1
