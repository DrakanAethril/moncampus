; https://symfony.com/doc/current/performance.html#use-the-opcache-class-preloading
opcache.preload_user = www-data
opcache.preload = /app/config/preload.php
; https://symfony.com/doc/current/performance.html#don-t-check-php-files-timestamps
opcache.validate_timestamps = 0

; opcache.preload above runs config/preload.php - Symfony's own generated
; App_KernelProdContainer.preload.php - at the start of *every* FrankenPHP worker process, not
; just once at build time: it opcache_compile_file()s essentially every service/entity/controller
; class the container references. That's the same class of eager, whole-app compilation the
; Dockerfile's build-time `cache:clear` step already needed a temporary 512M for (confirmed: OOMs
; at 128M) - but preloading runs under the plain runtime memory_limit from php.ini-production
; (128M), which this app has since outgrown. Manifests as "Allowed memory size ... exhausted ...
; in Unknown on line 0" at container start (preloading failures have no real file/line context),
; which crash-loops the container since it happens before the worker ever serves a request.
memory_limit = 256M
