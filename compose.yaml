---
services:
  php:
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
      SERVER_NAME: ${SERVER_NAME:-localhost}, php:80
      DEFAULT_URI: https://${SERVER_NAME:-localhost}:${HTTPS_PORT:-443}
      # Run "composer require symfony/orm-pack" to install and configure Doctrine ORM
      # Run "composer require symfony/mercure-bundle" to install and configure the Mercure integration
      MERCURE_URL: ${CADDY_MERCURE_URL:-http://php/.well-known/mercure}
      MERCURE_PUBLIC_URL: ${CADDY_MERCURE_PUBLIC_URL:-https://${SERVER_NAME:-localhost}:${HTTPS_PORT:-443}/.well-known/mercure}
      # DATABASE_URL and MERCURE_PUBLISHER_JWT_KEY/MERCURE_SUBSCRIBER_JWT_KEY/MERCURE_JWT_SECRET are
      # credential-shaped (the Mercure keys are read directly by Caddy's Mercure module from the
      # container's OS environment, not just by PHP) - deliberately not declared here so this file
      # never carries a default. Supplied via env_file: .env.dev.local (compose.override.yaml, dev)
      # or as required real env vars (compose.prod.yaml, prod).
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - name: http
        target: 80
        published: ${HTTP_PORT:-80}
        protocol: tcp
      - name: https
        target: 443
        published: ${HTTPS_PORT:-443}
        protocol: tcp
      - name: http3
        target: 443
        published: ${HTTP3_PORT:-443}
        protocol: udp

# Mercure is installed as a Caddy module, prevent the Flex recipe from installing another service
###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###

###> doctrine/doctrine-bundle ###
  database:
    restart: unless-stopped
    image: mysql:${MYSQL_VERSION:-8.0.32}
    environment:
      TZ: Europe/Paris
      MYSQL_DATABASE: ${MYSQL_DATABASE:-beaupeyrat_mgmt}
      # MYSQL_ROOT_PASSWORD/MYSQL_USER/MYSQL_PASSWORD are credential-shaped - deliberately not
      # declared here so this file never carries a default or hardcoded value (this previously had
      # MYSQL_ROOT_PASSWORD hardcoded to "root", and a typo'd "PMYSQL_USER" key that meant the
      # database never actually received a properly-named MYSQL_USER var - both fixed by removing
      # the compose-level substitution entirely). Supplied via env_file: .env.dev.local
      # (compose.override.yaml, dev) or as required real env vars (compose.prod.yaml, prod).
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/mysql:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/mysql:rw
###< doctrine/doctrine-bundle ###

volumes:
  caddy_data:
  caddy_config:
###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###

###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
