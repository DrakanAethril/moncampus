# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $ldapBaseDn: '%env(LDAP_BASE_DN)%'
            # Optional, defaults to $ldapBaseDn (see App\Service\LdapGroupSyncer/
            # App\Security\LdapUserMapper's resolveGroupBaseDn()) - only needs setting when
            # groups live under a different subtree than users, e.g. a Samba 4 AD DC with users
            # under OU=People and groups under OU=Groups.
            string $ldapGroupBaseDn: '%env(LDAP_GROUP_BASE_DN)%'
            string $ldapSearchDn: '%env(LDAP_SEARCH_DN)%'
            string $ldapSearchPassword: '%env(LDAP_SEARCH_PASSWORD)%'
            # Schema differs by directory flavor - dev's openldap container is classic
            # OpenLDAP/RFC2307 (inetOrgPerson/groupOfNames/uid), production is a Samba 4 AD DC
            # (user/group/sAMAccountName) - see App\Security\LdapAuthenticator,
            # App\Security\LdapUserMapper, App\Service\LdapUserSyncer.
            string $ldapUsernameAttribute: '%env(LDAP_USERNAME_ATTRIBUTE)%'
            string $ldapUserObjectClass: '%env(LDAP_USER_OBJECT_CLASS)%'
            string $ldapGroupObjectClass: '%env(LDAP_GROUP_OBJECT_CLASS)%'
            string $awsCloudfrontDomain: '%env(AWS_CLOUDFRONT_DOMAIN)%'
            string $awsS3PublicEndpoint: '%env(AWS_S3_PUBLIC_ENDPOINT)%'
            string $awsS3Bucket: '%env(AWS_S3_BUCKET)%'
            string $gotenbergUrl: '%env(GOTENBERG_URL)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # LDAP client used by App\Security\LdapAuthenticator to bind/search the directory - built via
    # a factory, not a plain argument array, so the TLS CA-cert options can be omitted entirely
    # for dev's plain-LDAP container while production verifies its LDAPS certificate - see
    # App\Service\LdapAdapterFactory.
    #
    # Tagged kernel.reset so its underlying ext-ldap connection gets dropped (Adapter::reset())
    # after every request, not just once when this shared service is first built. Without this,
    # FrankenPHP worker mode (frankenphp/Caddyfile's "worker { file ./public/index.php }") keeps
    # this same Adapter instance - and the one TCP/TLS connection it opened - alive across every
    # request handled by that worker process for as long as it runs, so the first LDAP-server- or
    # firewall-side idle timeout after a login kills that connection and every later login on the
    # same worker fails with a connect error until the worker itself eventually recycles.
    Symfony\Component\Ldap\Adapter\ExtLdap\Adapter:
        factory: ['App\Service\LdapAdapterFactory', 'create']
        arguments:
            $host: '%env(LDAP_HOST)%'
            $port: '%env(int:LDAP_PORT)%'
            $encryption: '%env(LDAP_ENCRYPTION)%'
            $tlsCaCertPath: '%env(LDAP_TLS_CA_CERT_PATH)%'
        tags:
            - { name: 'kernel.reset', method: 'reset' }

    Symfony\Component\Ldap\Ldap:
        arguments: ['@Symfony\Component\Ldap\Adapter\ExtLdap\Adapter']

    Symfony\Component\Ldap\LdapInterface: '@Symfony\Component\Ldap\Ldap'

    # S3 client backing the "uploads.storage" Flysystem storage (config/packages/flysystem.yaml) -
    # built via a factory, not a plain argument array, so the endpoint/path-style options can be
    # omitted entirely for real AWS in production while dev points them at the local MinIO
    # container - see App\Service\S3ClientFactory.
    Aws\S3\S3Client:
        factory: ['App\Service\S3ClientFactory', 'create']
        arguments:
            $region: '%env(AWS_S3_REGION)%'
            $accessKeyId: '%env(AWS_ACCESS_KEY_ID)%'
            $secretAccessKey: '%env(AWS_SECRET_ACCESS_KEY)%'
            $endpoint: '%env(AWS_S3_ENDPOINT)%'
