framework:
    html_sanitizer:
        sanitizers:
            # Message::$body is HugeRTE-authored HTML rendered back to other users (see
            # design/validated/internal-messaging.md). allow_safe_elements covers every element
            # the toolbar in assets/controllers/hugerte_editor_controller.js can produce (a[href],
            # strong/em/s, blockquote, pre, h1, ul/ol/li, br, div - see
            # vendor/symfony/html-sanitizer/Reference/W3CReference.php) - anything else (script,
            # style, event handler attributes, ...) is dropped by default.
            app.message_body:
                allow_safe_elements: true

            # SignupList::$description - same HugeRTE toolbar/wiring as Message::$body above, just
            # a different sanitizer instance per App\Controller\SignupListController (each feature
            # gets its own sanitizer target rather than sharing app.message_body across unrelated
            # entities, even though the config happens to be identical today).
            app.signup_list_description:
                allow_safe_elements: true

            # User::$signature - a deliberately narrower toolbar than message_body's (see
            # assets/controllers/hugerte_editor_controller.js's signatureValue): bold/italic/
            # underline/link/color only, no lists/blockquote/headings. allow_safe_elements covers
            # bold/italic/link already; <u> (underline) and span[style] (forecolor) aren't part of
            # that preset so they're added explicitly - nothing else is allowed through.
            app.message_signature:
                allow_safe_elements: true
                allow_elements:
                    u: '*'
                    span: [style]
