framework:
    messenger:
        failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'
            sync: 'sync://'

        default_bus: messenger.bus.default

        buses:
            messenger.bus.default: []

        routing:
            # Routed to "sync" (sends in-process, no worker needed) rather than "async" - nothing
            # in this app's infra (no compose service, no supervisor process) ever runs
            # `messenger:consume async`, so anything routed there queued forever and never
            # actually sent. Revisit if a real background worker gets added and bulk sends need to
            # stop blocking the request.
            Symfony\Component\Mailer\Messenger\SendEmailMessage: sync
            Symfony\Component\Notifier\Message\ChatMessage: sync
            Symfony\Component\Notifier\Message\SmsMessage: sync

            # Route your messages to the transports
            # 'App\Message\YourMessage': async
