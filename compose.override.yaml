---
# Development environment override
services:
  php:
    image: ${IMAGES_PREFIX:-}app-php-dev
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
      - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      # Keep var/ off the bind-mount for faster I/O on Mac/Windows; comment to inspect from the host.
      - /app/var
      # If you develop on Mac or Windows you can remove the vendor/ directory
      #  from the bind-mount for better performance by enabling the next line:
      #- /app/vendor
    environment:
      # Scoped to actual source dirs (not var/, vendor/) so runtime-generated cache files don't
      # cause spurious worker restarts / hot-reload page morphs. See
      # https://frankenphp.dev/docs/config/#watching-for-file-changes
      FRANKENPHP_WORKER_CONFIG: |
        watch ./config/**/*.yaml
        watch ./migrations/**/*.php
        watch ./src/**/*.php
        watch ./templates/**/*.twig
        watch ./translations/**/*.yaml
      FRANKENPHP_SITE_CONFIG: |
        hot_reload {
            watch ./assets/**/*.{css,js}
            watch ./config/**/*.yaml
            watch ./migrations/**/*.php
            watch ./src/**/*.php
            watch ./templates/**/*.twig
            watch ./translations/**/*.yaml
        }
      MERCURE_EXTRA_DIRECTIVES: demo
      # See https://xdebug.org/docs/all_settings#mode
      XDEBUG_MODE: "${XDEBUG_MODE:-develop}"
      APP_ENV: "${APP_ENV:-dev}"
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    tty: true
###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###

###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "3306"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - database
    environment:
      PMA_HOST: database
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "8080:80"

  # Local stand-in for the corporate LDAP server, dev-only (never built/started in prod).
  # Reachable from the php container as ldap://openldap:1389
  openldap:
    image: bitnamilegacy/openldap:2.6.10-debian-12-r4
    restart: unless-stopped
    environment:
      LDAP_ADMIN_USERNAME: admin
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD:-admin}
      LDAP_ROOT: dc=beaupeyrat,dc=lan
      # Directory tree (org units, groups, users) is seeded from ./frankenphp/ldap/*.ldif
      # instead of the simple LDAP_USERS/LDAP_GROUP vars, which can't express per-user
      # multi-group membership. Only applied on a fresh/empty ldap_data volume.
      LDAP_CUSTOM_LDIF_DIR: /ldifs
    volumes:
      - ldap_data:/bitnami/openldap
      - ./frankenphp/ldap:/ldifs:ro
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost:1389", "-D", "cn=admin,dc=beaupeyrat,dc=lan", "-w", "${LDAP_ADMIN_PASSWORD:-admin}", "-b", "dc=beaupeyrat,dc=lan"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ldap_data:
