---
# Development environment override
services:
  php:
    image: ${IMAGES_PREFIX:-}app-php-dev
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app
      - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
      # Keep var/ off the bind-mount for faster I/O on Mac/Windows; comment to inspect from the host.
      - /app/var
      # If you develop on Mac or Windows you can remove the vendor/ directory
      #  from the bind-mount for better performance by enabling the next line:
      #- /app/vendor
    environment:
      # Scoped to actual source dirs (not var/, vendor/) so runtime-generated cache files don't
      # cause spurious worker restarts / hot-reload page morphs. See
      # https://frankenphp.dev/docs/config/#watching-for-file-changes
      FRANKENPHP_WORKER_CONFIG: |
        watch ./config/**/*.yaml
        watch ./migrations/**/*.php
        watch ./src/**/*.php
        watch ./templates/**/*.twig
        watch ./translations/**/*.yaml
      FRANKENPHP_SITE_CONFIG: |
        hot_reload {
            watch ./assets/**/*.{css,js}
            watch ./config/**/*.yaml
            watch ./migrations/**/*.php
            watch ./src/**/*.php
            watch ./templates/**/*.twig
            watch ./translations/**/*.yaml
        }
      MERCURE_EXTRA_DIRECTIVES: demo
      # See https://xdebug.org/docs/all_settings#mode
      XDEBUG_MODE: "${XDEBUG_MODE:-develop}"
      APP_ENV: "${APP_ENV:-dev}"
    # Injects DATABASE_URL, MERCURE_PUBLISHER_JWT_KEY/MERCURE_SUBSCRIBER_JWT_KEY/MERCURE_JWT_SECRET,
    # LDAP_*, and AWS_*/S3 credentials directly into the container's OS environment - needed
    # because compose.yaml deliberately never assembles these via docker-compose ${} substitution
    # (which can't read this file; see compose.yaml's comments) or hardcodes/defaults them. See
    # .env.dev.local.example for the template this file is copied from.
    env_file:
      - .env.dev.local
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    tty: true
###> symfony/mercure-bundle ###
###< symfony/mercure-bundle ###

###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "3306"
    # Injects MYSQL_ROOT_PASSWORD/MYSQL_USER/MYSQL_PASSWORD - see compose.yaml's comment on why
    # these are never defaulted/hardcoded there.
    env_file:
      - .env.dev.local
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: unless-stopped
    depends_on:
      - database
    environment:
      PMA_HOST: database
    # Injects MYSQL_ROOT_PASSWORD (previously hardcoded here to "password", which never actually
    # matched the database service's real root password - fixed by sourcing both from the same
    # file).
    env_file:
      - .env.dev.local
    ports:
      - "8080:80"

  # Local stand-in for the corporate LDAP server, dev-only (never built/started in prod).
  # Reachable from the php container as ldap://openldap:1389
  openldap:
    image: bitnamilegacy/openldap:2.6.10-debian-12-r4
    restart: unless-stopped
    environment:
      LDAP_ADMIN_USERNAME: admin
      LDAP_ROOT: dc=beaupeyrat,dc=lan
      # Directory tree (org units, groups, users) is seeded from ./frankenphp/ldap/*.ldif
      # instead of the simple LDAP_USERS/LDAP_GROUP vars, which can't express per-user
      # multi-group membership. Only applied on a fresh/empty ldap_data volume.
      LDAP_CUSTOM_LDIF_DIR: /ldifs
    # Injects LDAP_ADMIN_PASSWORD - see compose.yaml's comment on why this is never
    # defaulted/hardcoded there.
    env_file:
      - .env.dev.local
    volumes:
      - ldap_data:/bitnami/openldap
      - ./frankenphp/ldap:/ldifs:ro
    healthcheck:
      # CMD-SHELL (not exec-array CMD) so $LDAP_ADMIN_PASSWORD is expanded by the container's own
      # shell at runtime from the env_file-injected value, not by docker-compose at parse time.
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost:1389 -D cn=admin,dc=beaupeyrat,dc=lan -w \"$$LDAP_ADMIN_PASSWORD\" -b dc=beaupeyrat,dc=lan"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Local S3-compatible storage stand-in, dev-only (never built/started in prod). S3 API
  # reachable from the php container at http://minio:9000 (AWS_S3_ENDPOINT) and from the host/
  # browser at http://localhost:9000 (AWS_S3_PUBLIC_ENDPOINT - fixed port, not random, so that
  # value in .env stays correct); web console at localhost:9001 (login with
  # AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY from .env, default minioadmin/minioadmin).
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    # Injects MINIO_ROOT_USER/MINIO_ROOT_PASSWORD directly (must match AWS_ACCESS_KEY_ID/
    # AWS_SECRET_ACCESS_KEY - see .env.dev.local's comment on why both are spelled out there,
    # since env_file can't rename a var the way docker-compose ${} substitution could).
    env_file:
      - .env.dev.local
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # One-off: creates the dev bucket on first boot, since MinIO doesn't auto-create it, and makes
  # it anonymously readable. Real environments never expose the bucket directly (CloudFront +
  # Origin Access Control does - see App\Service\FileUploadService); this dev-only bucket has no
  # real user data, and public-read is what makes AWS_S3_PUBLIC_ENDPOINT URLs actually load in a
  # browser without standing up a local CDN. Retries until the API is reachable instead of
  # depending on a healthcheck, since not every minio image variant ships the tooling a
  # healthcheck would need. Safe to re-run (both commands are no-ops once already applied).
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    # Injects AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY/AWS_S3_BUCKET, expanded below by the
    # container's own shell at runtime ($VAR, not docker-compose ${} substitution at parse time -
    # see compose.yaml's comment on why these are never defaulted there).
    env_file:
      - .env.dev.local
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$AWS_ACCESS_KEY_ID $$AWS_SECRET_ACCESS_KEY; do sleep 1; done &&
      mc mb --ignore-existing local/$$AWS_S3_BUCKET &&
      mc anonymous set download local/$$AWS_S3_BUCKET
      "

volumes:
  ldap_data:
  minio_data:
