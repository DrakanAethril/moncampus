---
# Production environment override
services:
  php:
    image: ${IMAGES_PREFIX:-}app-php-prod
    build:
      context: .
      target: frankenphp_prod
    env_file:
      - .env.prod.local
    environment:
      # Hardcoded, not `${APP_ENV:-prod}` - that pattern silently picks up a stray APP_ENV=dev
      # from whatever shell happens to invoke `docker compose up` (e.g. left exported from local
      # testing), overriding even the Dockerfile's `ENV APP_ENV=prod` - which loads
      # symfony/debug-bundle (config/bundles.php's 'dev' => true scope), a require-dev package
      # this image's `composer install --no-dev` never installed, crash-looping the container.
      # This overlay's entire purpose is to mean prod - it must never be configurable.
      APP_ENV: prod
    volumes:
      # LDAPS certificate verification (App\Service\LdapAdapterFactory, LDAP_TLS_CA_CERT_PATH in
      # .env.prod.local must point at this same in-container path) - ldap-ca.pem is a public CA
      # certificate (not a secret), committed at the repo root - see docs/production.md.
      - ./ldap-ca.pem:/etc/moncampus/ldap-ca.pem:ro
      # PHP session files (config/packages/framework.yaml's save_path) - a named volume, not part
      # of the app image, so logged-in users' sessions survive this container being rebuilt from
      # scratch on every deploy instead of everyone getting silently logged out mid-navigation.
      - php_sessions:/app/var/sessions

volumes:
  php_sessions:
